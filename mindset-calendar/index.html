<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#fbf7f4" />
<title>お金と私に愛される脳内プログラミング 進化版 ｜ Money Brain Lab.</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   22日間 マインドセット・ワーク
   カラー：白 / 上品なピンク / ゴールド
   ========================================================= */
:root{
  --bg:        #fbf7f4;
  --bg-2:      #f6ebe8;
  --card:      #ffffff;
  --ink:       #4a3f3a;
  --ink-soft:  #8a7d76;
  --pink:      #e7b6b6;
  --pink-deep: #d98c97;
  --gold:      #c2a25a;
  --gold-soft: #e8d9b0;
  --line:      #efe3dc;
  --shadow:    0 10px 40px rgba(160,120,110,.16);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overscroll-behavior:none; }
body{
  font-family:"Noto Serif JP", serif;
  color:var(--ink);
  background:radial-gradient(120% 80% at 50% -10%, var(--bg-2) 0%, var(--bg) 55%) fixed;
  -webkit-font-smoothing:antialiased;
}

/* 1画面固定（スクロール禁止） */
.app{
  height:100svh; height:100dvh; min-height:100vh;
  width:100%; max-width:480px; margin:0 auto;
  display:flex; flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 12px) 14px calc(env(safe-area-inset-bottom) + 12px);
  overflow:hidden;
}

/* ヘッダー */
.head{
  flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
  gap:8px; padding:2px 4px 10px;
}
.head .brand{
  font-family:"Cormorant Garamond", serif; font-style:italic;
  font-size:15px; letter-spacing:.04em; color:var(--gold);
}
.head .head-btns{ display:flex; align-items:center; gap:7px; }
.head .today-btn{
  border:1px solid var(--gold-soft);
  background:linear-gradient(180deg,#fff,#fff8ee);
  color:var(--gold); font-family:"Noto Sans JP",sans-serif;
  font-size:11px; font-weight:700; letter-spacing:.06em;
  padding:6px 12px; border-radius:999px; cursor:pointer; white-space:nowrap;
}
.head .today-btn.ghost{
  background:#fff; border-color:var(--line); color:var(--pink-deep);
}
.head .today-btn:active{ transform:scale(.96); }

/* カード */
.card{
  flex:1 1 auto; min-height:0;
  background:var(--card); border-radius:26px;
  box-shadow:var(--shadow); border:1px solid var(--line);
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.card::before{
  content:""; position:absolute; left:0; right:0; top:0; height:3px;
  background:linear-gradient(90deg,var(--gold-soft),var(--gold),var(--gold-soft)); opacity:.8;
}

/* 日付バー */
.daybar{
  flex:0 0 auto; display:flex; align-items:baseline; justify-content:center;
  gap:12px; padding:15px 18px 6px;
}
.daybar .dnum{
  font-family:"Cormorant Garamond", serif; font-size:38px; line-height:1;
  font-weight:500; color:var(--pink-deep);
}
.daybar .dlabel{
  font-family:"Noto Sans JP",sans-serif; font-size:10px; letter-spacing:.3em;
  color:var(--gold); text-transform:uppercase; font-weight:700;
}

/* タブ */
.tabs{
  flex:0 0 auto; display:flex; gap:6px; padding:4px 16px 8px; justify-content:center;
}
.tab{
  font-family:"Noto Sans JP",sans-serif; font-size:12px; font-weight:700; letter-spacing:.08em;
  color:var(--ink-soft); background:transparent; border:none;
  padding:8px 18px; border-radius:999px; cursor:pointer; transition:.18s;
}
.tab.active{
  color:#fff; background:linear-gradient(180deg,var(--pink),var(--pink-deep));
  box-shadow:0 4px 14px rgba(217,140,151,.4);
}

/* パネル領域 */
.panels{ flex:1 1 auto; min-height:0; position:relative; }
.panel{ position:absolute; inset:0; display:none; flex-direction:column; padding:4px 20px 16px; }
.panel.active{ display:flex; }

/* --- ワーク（全ページ共通の固定サイズ・左揃え。長い時だけ本文エリア内でスクロール） --- */
.work-area{
  flex:1 1 auto; min-height:0;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.work-area::-webkit-scrollbar{ width:0; height:0; }   /* スクロールバーは隠す */
.work-fit{ width:100%; text-align:left; padding:2px 0 6px; }
.work-note{
  font-family:"Noto Sans JP",sans-serif; font-size:13px; letter-spacing:.04em;
  color:var(--pink-deep); margin:0 0 8px; line-height:1.6;
}
.work-title{
  font-size:20px; font-weight:600; color:var(--gold);
  line-height:1.6; letter-spacing:.01em; margin:0 0 14px;
  white-space:pre-wrap; word-break:break-word;
}
.work-body{
  font-size:16px; font-weight:500; color:var(--ink);
  line-height:1.95; letter-spacing:.01em;
  white-space:pre-wrap; word-break:break-word;
}
/* スクロール可能なときに下端をふんわりフェード */
.work-area{
  -webkit-mask-image:linear-gradient(180deg, transparent 0, #000 10px, #000 calc(100% - 14px), transparent 100%);
          mask-image:linear-gradient(180deg, transparent 0, #000 10px, #000 calc(100% - 14px), transparent 100%);
}

/* --- メモ（日付ごとに履歴を貯める） --- */
.memo-scroll{
  flex:1 1 auto; min-height:0; display:flex; flex-direction:column;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.memo-scroll::-webkit-scrollbar{ width:0; height:0; }
.memo-head{ flex:0 0 auto; display:flex; align-items:baseline; justify-content:space-between; margin:2px 0 8px; }
.memo-head .lbl{
  font-family:"Noto Sans JP",sans-serif; font-size:12px; font-weight:700; letter-spacing:.08em; color:var(--pink-deep);
}
.memo-head .memo-date{ color:var(--gold); font-size:11px; letter-spacing:.04em; }
.memo-head .saved{
  font-family:"Noto Sans JP",sans-serif; font-size:10px; color:var(--ink-soft); opacity:0; transition:.3s;
}
.memo-head .saved.show{ opacity:1; }
.memo-area{
  flex:0 0 auto; height:150px; width:100%; resize:none;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fffdfb,#fff7f4);
  border-radius:16px; padding:14px 15px;
  font-family:"Noto Serif JP",serif; font-size:15px; line-height:1.9; color:var(--ink); outline:none;
}
.memo-area:focus{ border-color:var(--pink); box-shadow:0 0 0 3px rgba(231,182,182,.25); }
.memo-area::placeholder{ color:#c9bcb4; }

/* これまでの記録（前回までの同じ日のメモ） */
.memo-past{ flex:0 0 auto; padding-top:6px; }
.memo-past .past-ttl{
  display:flex; align-items:center; gap:8px;
  font-family:"Noto Sans JP",sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em;
  color:var(--ink-soft); margin:14px 2px 6px;
}
.memo-past .past-ttl::before,
.memo-past .past-ttl::after{ content:""; flex:1 1 auto; height:1px; background:var(--line); }
.past-item{ border:1px solid var(--line); border-radius:14px; background:#fff; padding:11px 14px; margin:8px 0; }
.past-item .pd{
  font-family:"Noto Sans JP",sans-serif; font-size:11px; font-weight:700; color:var(--gold); letter-spacing:.06em; margin-bottom:5px;
}
.past-item .pt{
  font-family:"Noto Serif JP",serif; font-size:14px; color:var(--ink); line-height:1.8; white-space:pre-wrap; word-break:break-word;
}
.memo-past .none{
  text-align:center; color:var(--ink-soft); font-family:"Noto Serif JP",serif; font-size:12px; line-height:1.8; padding:16px 8px;
}

/* フッターナビ */
.nav{ flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 4px 2px; }
.nav button{ font-family:"Noto Sans JP",sans-serif; cursor:pointer; border-radius:999px; transition:.15s; }
.nav .arrow{
  flex:0 0 auto; width:46px; height:46px; border:1px solid var(--line);
  background:#fff; color:var(--pink-deep); font-size:18px; box-shadow:0 4px 12px rgba(160,120,110,.1);
}
.nav .arrow:disabled{ opacity:.3; cursor:default; }
.nav .arrow:active:not(:disabled){ transform:scale(.93); }
.nav .index-btn{
  flex:1 1 auto; height:46px; border:1px solid var(--gold-soft);
  background:linear-gradient(180deg,#fff,#fffaf0); color:var(--gold);
  font-size:12px; font-weight:700; letter-spacing:.14em;
}
.nav .index-btn:active{ transform:scale(.98); }

/* 一覧シート */
.sheet-mask{
  position:fixed; inset:0; background:rgba(74,63,58,.4); backdrop-filter:blur(3px);
  display:none; align-items:flex-end; justify-content:center; z-index:50;
}
.sheet-mask.open{ display:flex; }
.sheet{
  width:100%; max-width:480px; background:var(--bg);
  border-radius:26px 26px 0 0; box-shadow:0 -10px 40px rgba(0,0,0,.2);
  padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);
  max-height:82svh; overflow:auto; animation:rise .25s ease;
}
@keyframes rise{ from{ transform:translateY(20px); opacity:.6 } to{ transform:none; opacity:1 } }
.sheet h2{ font-size:15px; font-weight:600; text-align:center; color:var(--gold); letter-spacing:.1em; margin:4px 0 16px; }
.cover-pick{
  width:100%; text-align:left; border:1px solid var(--line); background:#fff;
  border-radius:14px; padding:12px 16px; margin-bottom:14px;
  font-family:"Noto Serif JP",serif; font-size:14px; color:var(--ink); cursor:pointer;
}
.cover-pick.cur{ border-color:var(--pink); background:#fff6f6; }
.grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:9px; }
.grid .cell{
  aspect-ratio:1/1; border:1px solid var(--line); background:#fff; border-radius:14px;
  font-family:"Cormorant Garamond",serif; font-size:19px; color:var(--ink);
  display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative;
}
.grid .cell.cur{
  border-color:var(--pink-deep); background:linear-gradient(180deg,var(--pink),var(--pink-deep));
  color:#fff; box-shadow:0 4px 12px rgba(217,140,151,.4);
}
.grid .cell.done::after{
  content:""; position:absolute; top:6px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--gold);
}
.grid .cell.cur.done::after{ background:#fff; }
.sheet .close{
  display:block; width:100%; margin-top:18px; border:none; background:transparent;
  color:var(--ink-soft); font-family:"Noto Sans JP",sans-serif; font-size:12px; letter-spacing:.1em; padding:10px; cursor:pointer;
}

/* メモ ふりかえり一覧 */
.memo-item{
  width:100%; text-align:left; border:1px solid var(--line); background:#fff;
  border-radius:14px; padding:13px 15px; margin-bottom:10px; cursor:pointer; display:block;
}
.memo-item:active{ background:#fff8f6; }
.memo-item .mi-head{
  font-family:"Noto Sans JP",sans-serif; font-size:11px; font-weight:700;
  color:var(--pink-deep); letter-spacing:.04em; margin-bottom:8px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.memo-item .mi-entry{ padding:8px 0; border-top:1px solid var(--line); }
.memo-item .mi-entry:first-of-type{ border-top:none; }
.memo-item .mi-date{
  font-family:"Noto Sans JP",sans-serif; font-size:10px; font-weight:700;
  color:var(--gold); letter-spacing:.06em; margin-bottom:4px;
}
.memo-item .mi-text{
  font-family:"Noto Serif JP",serif; font-size:13px; color:var(--ink);
  line-height:1.75; white-space:pre-wrap; word-break:break-word;
}
.memo-empty{
  text-align:center; color:var(--ink-soft); font-family:"Noto Serif JP",serif;
  font-size:13px; line-height:1.9; padding:26px 8px; white-space:pre-wrap;
}

/* 表紙モード（中央寄せ・大きめ・固定サイズ） */
.app.cover .daybar,
.app.cover .tabs,
.app.cover .work-note,
.app.cover .panel.memo{ display:none; }
.app.cover .work-area{
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  -webkit-mask-image:none; mask-image:none;
}
.app.cover .work-fit{ text-align:center; }
.app.cover .work-title{
  font-family:"Cormorant Garamond",serif; font-style:italic; color:var(--gold);
  font-size:15px; letter-spacing:.12em; font-weight:500; margin:0 0 26px; line-height:1.4;
}
.app.cover .work-body{ font-size:26px; font-weight:600; line-height:2.0; color:var(--ink); }
.app.cover .card::after{
  content:""; position:absolute; left:50%; bottom:26px; transform:translateX(-50%);
  width:38px; height:1px; background:var(--gold-soft);
}
</style>
</head>

<body>
<div class="app" id="app">

  <header class="head">
    <span class="brand" id="brand">Money Brain Lab.</span>
    <div class="head-btns">
      <button class="today-btn ghost" id="memoListBtn">ふりかえり</button>
      <button class="today-btn" id="todayBtn">今日</button>
    </div>
  </header>

  <main class="card" id="card">

    <div class="daybar">
      <span class="dnum" id="dnum">1</span>
      <span class="dlabel" id="dlabel">DAY</span>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="work">ワーク</button>
      <button class="tab" data-tab="memo">感想メモ</button>
    </div>

    <div class="panels">
      <!-- ワーク -->
      <section class="panel work active" id="panelWork">
        <div class="work-area" id="workArea">
          <div class="work-fit" id="workFit">
            <p class="work-note"  id="workNote"></p>
            <h1 class="work-title" id="workTitle"></h1>
            <div class="work-body" id="workBody"></div>
          </div>
        </div>
      </section>

      <!-- メモ -->
      <section class="panel memo" id="panelMemo">
        <div class="memo-scroll" id="memoScroll">
          <div class="memo-head">
            <span class="lbl">今日のメモ <span class="memo-date" id="memoToday"></span></span>
            <span class="saved" id="savedTag">保存しました</span>
          </div>
          <textarea class="memo-area" id="memoArea"
            placeholder="今日の気づき・感じたこと…&#10;書いた内容は日付ごとに自動保存され、次の周でも見返せます。"></textarea>
          <div class="memo-past" id="memoPast"></div>
        </div>
      </section>
    </div>
  </main>

  <nav class="nav">
    <button class="arrow" id="prevBtn" aria-label="前へ">‹</button>
    <button class="index-btn" id="indexBtn">日を選ぶ</button>
    <button class="arrow" id="nextBtn" aria-label="次へ">›</button>
  </nav>
</div>

<div class="sheet-mask" id="sheetMask">
  <div class="sheet" id="sheet">
    <h2>ワークを選ぶ</h2>
    <button class="cover-pick" id="coverPick">表紙にもどる</button>
    <div class="grid" id="grid"></div>
    <button class="close" id="closeSheet">とじる</button>
  </div>
</div>

<!-- 感想メモ ふりかえり -->
<div class="sheet-mask" id="memoMask">
  <div class="sheet" id="memoSheet">
    <h2>感想メモ ふりかえり</h2>
    <div id="memoList"></div>
    <button class="close" id="closeMemo">とじる</button>
  </div>
</div>

<!-- ============================================================
     データ：表紙 ＋ 22日分（原文を1文字も削らず収録）
       type  : "Mission" / "Question"
       note  : 補足ラベル（無ければ省略）

       body  : 本文

<script>
const DATA = {

  /* ▼ 表紙 */

    { day:8, type:"Mission",
      title:`1日1個、家の中の自分を喜ばせないものを捨てる`,

    { day:12, type:"Mission",

    { day:15, type:"Question",

      body:`自分に贅沢をさせてあげると、お金って自分を喜ばすものになる。
お金って自分だから。

いよいよ、2/3` },

    { day:16, type:"Question",
      title:`自分を可愛く。美しくする・喜ばせる、アイテム・サービスは何?`,
      body:`お金に愛される人は、自分を可愛く・美しくするのが好き
男性であれば、清潔感がある人がこれに該当します。
今、着てる服は、理想の自分だったら着ている服ですか?

    { day:17, type:"Mission",
      title:`毎月○○万円(好きな額で)入ってくる○○ (好きな職業で)だったら、どんなお店に行く? そこに行く。`,
      body:`今の常識内でとった行動が理想の自分へと連れて行くことはありません。

どんな人と付き合う?
今できる範囲でやって見てください。

    { day:18, type:"Question",
      title:`あなたが人生において大切にしてる 人・ものは何?`,
      body:`人生って、つまり「時間」だ。

「お金」って、そんな大切な人との時間をより心地よくしてくれたり、そのもの自体を手に入れたりするための自分が豊かさを感じるための「道具」の1つだ。
「お金」という数値だけに惑わされて目の前の大切な人・ものとの「時間」を置き去りにしてませんか?` },

    { day:19, type:"Mission",
      title:`タダ働きする`,
      body:`「労働」と「お金」を切り離すワークです。
例えば、残業代をもらわずに、残業する。

人んちのトイレ掃除をする。

もちろん、スレッドで、無料モニター募集をかけていただいてもいいです。
(お互いに喜びがあれば、クロージング可。)
ぜひ、トライしてみてください。` },

    { day:20, type:"Question",
      title:`「お金持ち」「お金」ってどんなイメージ???`,
      body:`お金持ちになりたい! そう願う人が多い中で、なれない人が多いのはなぜだろう?
それは、あなたの中で、「お金持ち」ってどんな人なのか 言語化されてないから。
And、あなたの「お金持ち」 の概念の中に、「そうなりたくない!」 というネガティブな、不快なイメージが混じっているから。
「お金」も一緒。まずは、自分自身の「お金持ち」や「お金」に関するイメージを書き出して、「不快」なものがあれば、それとは反対のワードに置き換えてみてください。
(性格が悪い→優しいなど)
その前提を持った、「幸せなお金持ち」が現実に現れるから` },

    { day:21, type:"Mission",
      title:`1万円札を見て、触って、感じたことを書いてみる`,
      body:`あなたのお金のイメージはどんなものですか?
怖い?
大切?
楽しい?
その紙切れのために、自分の時間を使うって本当にしたいこと??` },

    { day:22, type:"Question",
      title:`今日が人生の最期の日なら何をする?`,
      body:`お金の奴隷からの解放ミッション。
お金よりも何よりも大切なのは「時間」です。
子どもと一緒に暮らせる時間。
旦那さんとご飯が食べられる時間。
友人と遊びに行く時間。
両親にありがとうをいう時間。
美味しいものを食べる時間。
私の中で「価値がある」という時間を増やしてあげてください。
それをするためのお金は十分にあります。
＊これ、やってねwww` }
  ]
};
</script>

<!-- ============================================================
     アプリ本体
     ============================================================ -->
<script>
(function(){
  "use strict";

  const app        = document.getElementById("app");
  const card       = document.getElementById("card");
  const brandEl    = document.getElementById("brand");
  const dnum       = document.getElementById("dnum");
  const dlabel     = document.getElementById("dlabel");
  const tabsEl     = document.getElementById("tabs");
  const tabBtns    = tabsEl.querySelectorAll(".tab");
  const panelWork  = document.getElementById("panelWork");
  const panelMemo  = document.getElementById("panelMemo");
  const workArea   = document.getElementById("workArea");
  const workFit    = document.getElementById("workFit");
  const workNote   = document.getElementById("workNote");
  const workTitle  = document.getElementById("workTitle");
  const workBody   = document.getElementById("workBody");
  const memoArea   = document.getElementById("memoArea");
  const memoToday  = document.getElementById("memoToday");
  const memoPast   = document.getElementById("memoPast");
  const memoScroll = document.getElementById("memoScroll");
  const savedTag   = document.getElementById("savedTag");
  const prevBtn    = document.getElementById("prevBtn");
  const nextBtn    = document.getElementById("nextBtn");
  const indexBtn   = document.getElementById("indexBtn");
  const todayBtn   = document.getElementById("todayBtn");
  const sheetMask  = document.getElementById("sheetMask");
  const grid       = document.getElementById("grid");
  const coverPick  = document.getElementById("coverPick");
  const closeSheet = document.getElementById("closeSheet");
  const memoListBtn= document.getElementById("memoListBtn");
  const memoMask   = document.getElementById("memoMask");
  const memoList   = document.getElementById("memoList");
  const closeMemo  = document.getElementById("closeMemo");

  const TOTAL   = DATA.days.length;
  const LS_POS  = "mindset.pos";
  const LS_FIRST= "mindset.firstDate";
  const LS_MEMO = "mindset.memo.";

  let pos = -1;       // -1: 表紙 / 0..TOTAL-1
  let tab = "work";

  brandEl.textContent = DATA.brand || "Mindset Work";

  /* ---- 感想メモ：日付ごとの履歴で保存（何周もして変化を見返せる） ---- */
  function todayKey(){
    const n = new Date();
    return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
  }
  function fmtDate(s){
    if(!s) return "日付なし";
    const p = s.split("-");
    if(p.length<3) return s;
    return p[0]+"年"+Number(p[1])+"月"+Number(p[2])+"日";
  }
  function getEntries(day){
    const raw = localStorage.getItem(LS_MEMO + day);
    if(!raw) return [];
    try{
      const v = JSON.parse(raw);
      if(Array.isArray(v)) return v;
      if(typeof v === "string") return v.trim() ? [{d:"", t:v}] : [];
    }catch(e){
      return raw.trim() ? [{d:"", t:raw}] : [];   // 旧形式（ただの文字列）を救済
    }
    return [];
  }
  function setEntries(day, arr){
    if(arr && arr.length) localStorage.setItem(LS_MEMO + day, JSON.stringify(arr));
    else localStorage.removeItem(LS_MEMO + day);
  }
  function hasMemo(day){ return getEntries(day).some(e=>e.t && e.t.trim()); }

  /* 今日のワーク番号（初回起動日からの経過日数で進む） */
  function todayIndex(){
    let first = localStorage.getItem(LS_FIRST);
    const now = new Date();
    const todayStr = now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate();
    if(!first){ localStorage.setItem(LS_FIRST, todayStr); first = todayStr; }
    const [fy,fm,fd] = first.split("-").map(Number);
    const f = new Date(fy, fm-1, fd);
    const t = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = Math.floor((t - f) / 86400000);
    return Math.min(Math.max(diff, 0), TOTAL-1);
  }

  function render(){
    if(pos < 0){
      app.classList.add("cover");
      brandEl.style.visibility = "hidden";
      workNote.style.display = "none";
      workTitle.style.display = "";
      workTitle.textContent = DATA.cover.title || "";
      workBody.textContent  = DATA.cover.body || "";
    }else{
      app.classList.remove("cover");
      brandEl.style.visibility = "visible";
      const d = DATA.days[pos];
      dnum.textContent   = d.day;
      dlabel.textContent = (d.type || "").toUpperCase();
      workNote.textContent = d.note || "";
      workNote.style.display = d.note ? "" : "none";
      workTitle.textContent = d.title || "";
      workTitle.style.display = d.title ? "" : "none";
      workBody.textContent  = d.body || "";
      renderMemo(d.day);
    }
    setTab(tab, true);
    updateNav();
    workArea.scrollTop = 0;          // ページを変えたら本文は先頭から
    if(memoScroll) memoScroll.scrollTop = 0;
    localStorage.setItem(LS_POS, String(pos));
  }

  /* メモ画面：今日の入力欄＋これまでの記録（前回までの同じ日のメモ） */
  function renderMemo(day){
    const today = todayKey();
    memoToday.textContent = "（" + fmtDate(today) + "）";
    const entries = getEntries(day);
    const mine = entries.find(e=>e.d===today);
    memoArea.value = mine ? mine.t : "";

    // 今日以外（前回までの記録）を新しい順に
    const past = entries.filter(e=>e.d!==today && e.t && e.t.trim())
                        .sort((a,b)=>(b.d||"").localeCompare(a.d||""));
    memoPast.innerHTML = "";
    if(past.length){
      const ttl = document.createElement("div");
      ttl.className = "past-ttl";
      ttl.textContent = "これまでの記録（前回まで）";
      memoPast.appendChild(ttl);
      past.forEach(e=>{
        const item = document.createElement("div");
        item.className = "past-item";
        const pd = document.createElement("div"); pd.className = "pd"; pd.textContent = fmtDate(e.d);
        const pt = document.createElement("div"); pt.className = "pt"; pt.textContent = e.t;
        item.appendChild(pd); item.appendChild(pt);
        memoPast.appendChild(item);
      });
    }
  }

  function updateNav(){
    prevBtn.disabled = (pos <= -1);
    nextBtn.disabled = (pos >= TOTAL-1);
  }

  function setTab(name, silent){
    tab = name;
    tabBtns.forEach(b=>b.classList.toggle("active", b.dataset.tab===name));
    panelWork.classList.toggle("active", name==="work");
    panelMemo.classList.toggle("active", name==="memo");
    if(name==="work" && !silent){
      workArea.scrollTop = 0;
    }
  }
  tabBtns.forEach(b=>{
    b.addEventListener("click", ()=>{ setTab(b.dataset.tab); });
  });

  function go(p, asMemo){
    pos = Math.min(Math.max(p, -1), TOTAL-1);
    tab = (asMemo && pos>=0) ? "memo" : "work";
    render();
  }
  prevBtn.addEventListener("click", ()=>go(pos-1));
  nextBtn.addEventListener("click", ()=>go(pos+1));
  todayBtn.addEventListener("click", ()=>go(todayIndex()));

  /* メモ自動保存（今日の日付のエントリーを更新。過去の記録は消さない） */
  let saveTimer = null;
  memoArea.addEventListener("input", ()=>{
    if(pos < 0) return;
    const d = DATA.days[pos];
    const today = todayKey();
    const entries = getEntries(d.day);
    const idx = entries.findIndex(e=>e.d===today);
    const val = memoArea.value;
    if(val.trim()){
      if(idx>=0) entries[idx].t = val;
      else entries.push({d:today, t:val});
    }else if(idx>=0){
      entries.splice(idx,1);   // 今日の分を空にしたら今日の分だけ削除
    }
    setEntries(d.day, entries);
    savedTag.classList.add("show");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>savedTag.classList.remove("show"), 1200);
  });

  /* 一覧シート */
  function buildGrid(){
    grid.innerHTML = "";
    DATA.days.forEach((d,i)=>{
      const cell = document.createElement("button");
      cell.className = "cell";
      cell.textContent = d.day;
      if(i===pos) cell.classList.add("cur");
      if(hasMemo(d.day)) cell.classList.add("done");
      cell.addEventListener("click", ()=>{ closeSheetFn(); go(i); });
      grid.appendChild(cell);
    });
    coverPick.classList.toggle("cur", pos===-1);
  }
  function openSheet(){ buildGrid(); sheetMask.classList.add("open"); }
  function closeSheetFn(){ sheetMask.classList.remove("open"); }
  indexBtn.addEventListener("click", openSheet);
  closeSheet.addEventListener("click", closeSheetFn);
  coverPick.addEventListener("click", ()=>{ closeSheetFn(); go(-1); });
  sheetMask.addEventListener("click", e=>{ if(e.target===sheetMask) closeSheetFn(); });

  /* 感想メモ ふりかえり一覧（日ごとに、過去の記録を日付つきで） */
  function buildMemoList(){
    memoList.innerHTML = "";
    let any = false;
    DATA.days.forEach((d,i)=>{
      const entries = getEntries(d.day).filter(e=>e.t && e.t.trim());
      if(!entries.length) return;
      any = true;
      entries.sort((a,b)=>(a.d||"").localeCompare(b.d||""));  // 古い順＝変化が分かる

      const item = document.createElement("button");
      item.className = "memo-item";
      const head = document.createElement("div");
      head.className = "mi-head";
      head.textContent = "DAY " + d.day + "　" + (d.title ? d.title.replace(/\n/g," ") : "");
      item.appendChild(head);

      entries.forEach(e=>{
        const ent = document.createElement("div");
        ent.className = "mi-entry";
        const ed = document.createElement("div"); ed.className = "mi-date"; ed.textContent = fmtDate(e.d);
        const et = document.createElement("div"); et.className = "mi-text"; et.textContent = e.t;
        ent.appendChild(ed); ent.appendChild(et);
        item.appendChild(ent);
      });

      item.addEventListener("click", ()=>{ closeMemoFn(); go(i, true); });
      memoList.appendChild(item);
    });
    if(!any){
      const e = document.createElement("div");
      e.className = "memo-empty";
      e.textContent = "まだ感想メモがありません。\nワークを読んで感じたことを、\n「感想メモ」タブに残してみましょう。";
      memoList.appendChild(e);
    }
  }
  function openMemoSheet(){ buildMemoList(); memoMask.classList.add("open"); }
  function closeMemoFn(){ memoMask.classList.remove("open"); }
  memoListBtn.addEventListener("click", openMemoSheet);
  closeMemo.addEventListener("click", closeMemoFn);
  memoMask.addEventListener("click", e=>{ if(e.target===memoMask) closeMemoFn(); });

  /* スワイプ送り */
  let tsx=0, tsy=0;
  card.addEventListener("touchstart", e=>{ tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; }, {passive:true});
  card.addEventListener("touchend", e=>{
    if(tab!=="work") return;
    const dx=e.changedTouches[0].clientX-tsx;
    const dy=e.changedTouches[0].clientY-tsy;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0) go(pos+1); else go(pos-1);
    }
  }, {passive:true});

  /* 起動 */
  function start(){
    todayIndex();
    const saved = localStorage.getItem(LS_POS);
    pos = (saved===null) ? -1 : parseInt(saved,10);
    if(isNaN(pos)) pos = -1;
    render();
  }
  start();
})();
</script>
